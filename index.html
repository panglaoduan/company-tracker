<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胖老段投资追踪</title>
    <link rel="stylesheet" href="style.css?v=20260324b">
</head>
<body>

<div class="container">
    <!-- 头部 -->
    <div class="header">
        <h1>📊 胖老段投资追踪</h1>
        <p class="subtitle">CEO 动态 · 经营战略 · 行业竞争 · 财报 · 股价异动 · 社媒观点</p>

        <!-- 筛选区 -->
        <div class="filter-bar">
            <label>🏢 公司:</label>
            <select id="companyFilter" onchange="applyFilter()">
                <option value="all">全部公司</option>
                <option value="tesla">特斯拉</option>
                <option value="spacex">SpaceX</option>
                <option value="ast_spacemobile">AST SpaceMobile</option>
                <option value="xiaomi">小米集团</option>
                <option value="ganli_pharma">甘李药业</option>
                <option value="horizon_robotics">地平线机器人</option>
            </select>

            <label>🔍 搜索:</label>
            <input type="text" id="searchInput" placeholder="关键词搜索..." oninput="applyFilter()">

            <button class="btn-refresh" onclick="loadEvents()">🔄 刷新</button>
        </div>

        <!-- 分类按钮 -->
        <div class="category-bar">
            <button class="cat-btn active" data-cat="all" onclick="toggleCategory('all')">全部</button>
            <button class="cat-btn" data-cat="strategy" onclick="toggleCategory('strategy')">📈 经营战略</button>
            <button class="cat-btn" data-cat="executive" onclick="toggleCategory('executive')">👔 高管动态</button>
            <button class="cat-btn" data-cat="competition" onclick="toggleCategory('competition')">⚔️ 行业竞争</button>
            <button class="cat-btn" data-cat="earnings" onclick="toggleCategory('earnings')">📋 财报发布</button>
            <button class="cat-btn" data-cat="volatility" onclick="toggleCategory('volatility')">⚡ 股价异动</button>
            <button class="cat-btn" data-cat="social" onclick="toggleCategory('social')">📺 社媒观点</button>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-value" id="totalEvents">0</div>
            <div class="stat-label">总事件数</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="todayEvents">0</div>
            <div class="stat-label">今日更新</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="companyCount">0</div>
            <div class="stat-label">追踪公司</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="lastUpdate" style="font-size:0.85em">—</div>
            <div class="stat-label">最后更新</div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content-area">
        <!-- 时间线 -->
        <div id="timeline">
            <div class="no-events"><p>正在加载数据...</p></div>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        <p>胖老段投资追踪 · 数据来源: Yahoo Finance / YouTube · 所有时间为北京时间 (GMT+8)</p>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-box">
        <span class="modal-close" onclick="closeModalDirect()">&times;</span>
        <div id="modalCompanyBar"></div>
        <h2 id="modalTitle"></h2>
        <p id="modalContent"></p>
        <div id="modalMeta"></div>
        <div id="modalFooter"></div>
    </div>
</div>

<!-- 脚本加载 -->
<script src="js/config.js?v=20260324b"></script>
<script src="js/kline.js?v=20260324b"></script>
<script src="js/timeline.js?v=20260324b"></script>

</body>
</html>
